<!DOCTYPE html>
<html>
<head>
    <title>Mengakses Objek Password</title>
</head>
<body>
    <form name="formTes" action="tesform.htm" method="post">
        <pre>
Password Baru               : <input type="password" name="password_1"><br>
Konfirmasi Password Baru    : <input type="password" name="password_2"><br>
        </pre>

        <input type="button" name="tombolOK" value="OK" onclick="cekPassword()">
    </form>

    <script>
        function cekPassword() {
            if (document.formTes.password_1.value !== document.formTes.password_2.value) {
                alert("Dua password yang Anda masukkan tidak sama");
            } else {
                alert("Password berhasil terverifikasi!");
                window.location.href = "tesform.htm";
            }
        }
    </script>
</body>
</html>
