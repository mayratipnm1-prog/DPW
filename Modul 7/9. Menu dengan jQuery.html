<!DOCTYPE html>
<html>
<head>
    <title>Menu jQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        article {
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        .menu {
            margin: 20px 0;
        }

        .menu button {
            background-color: maroon;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        .menu button:hover {
            background-color: rgb(183, 77, 77);
        }

        .content {
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            font-size: 18px;
            color: #555;
        }
    </style>
</head>

<body>

<script>
$(document).ready(function(){
    $("#btn1").click(function(){
        $("#isi").text("Ini halaman Home");
    });

    $("#btn2").click(function(){
        $("#isi").text("Ini halaman Profil");
    });

    $("#btn3").click(function(){
        $("#isi").text("Ini halaman Kontak");
    });
});
</script>

<article>
<h1>Menu jQuery</h1>

<div class="menu">
  <button id="btn1">Home</button>
  <button id="btn2">Profil</button>
  <button id="btn3">Kontak</button>
</div>

<div class="content" id="isi">
  Klik menu di atas
</div>

</article>

</body>
</html>
