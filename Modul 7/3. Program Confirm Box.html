<!DOCTYPE html>
<html>
<body>
    <h2>JavaScript Confirm Box</h2>
    <button onclick="myFunction()">Klik Ini</button>
    <p id="demo"></p>

    <script>
        function myFunction() {
            var txt;
            if (confirm("Apakah Anda ingin logout?")) {
                txt = "Anda mengklik OK, dan telah logout";
            } else {
                txt = "Anda mengklik Cancel, belum logout.";
            }
            document.getElementById("demo").innerHTML = txt;
        }
    </script>
</body>
</html>
