<article>

<h1>Form Jadwal Pertemuan</h1>

<form>

<fieldset>
<legend>Informasi Pribadi</legend>

<label>Nama</label>
<input type="text" name="nama" required><br>

<label>No. Telepon</label>
<input type="tel" pattern="[+62]{1}-[9-10]{4}" placeholder="0812-123456" required><br>

<label>Alamat Email</label>
<input type="email" placeholder="mayraruhand@gmail.com" required><br>

<label>Tanggal Lahir</label>
<input type="date" min="1970-01-01" max="2025-01-01" required>

</fieldset>

<fieldset>
<legend>Permintaan Pertemuan</legend>

<label>Tujuan Pertemuan</label>
<input type="text"><br>

<label>Tingkat Kepentingan</label>
<input type="range" min="0" max="100"><br>

<label>Tanggal</label>
<input type="date" required><br>

<label>Waktu</label>
<input type="time" min="17:00" max="21:00" required>

</fieldset>

<input type="submit" value="Submit">

</form>

</article>
