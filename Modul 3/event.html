<!DOCTYPE html>
<html lang="id">

<head>
    <title>Event HTML</title>
    <link rel="stylesheet" href="style.css">

    <title>Halaman Beranda</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <meta name="author" content="Mayra Ruhandini">
    <meta name="nim" content="253307003">

    
    <meta name="description" content="Website praktikum HTML5 Lanjut">
    <meta name="keywords" content="HTML5, Form, Audio, Video, SVG, Canvas">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Verdana, Geneva, sans-serif;
            margin: 0;
        }

        header {
            background-color: #708090;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }

        nav {
            float: left;
            width: 30%;
            height: 500px;
            background: #ccc;
            padding: 20px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            margin-bottom: 10px;
        }

        nav ul li a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        article {
            float: left;
            padding: 20px;
            width: 70%;
            background-color: #f1f1f1;
            height: 500px;
        }

        img {
            background-color: #4682B4;
            padding: 3px;
            text-align: center;
            color: white;
            width: 180px;
            height: 180px;
            object-fit: cover;
        }

        section::after {
            content: "";
            display: table;
            clear: both;
        }

        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {

            nav,
            article {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <header>
        <h2>Praktikum Dasar HTML5</h2>
    </header>

    <section>

        <nav>
            
            <li><a href="index.html">Home</a></li>
            <li><a href="gambar.html">Gambar</a></li>
            <li><a href="event.html">Event</a></li>
            <li><a href="audio.html">Audio</a></li>
            <li><a href="video.html">Video</a></li>
            <li><a href="svg.html">SVG</a></li>
            <li><a href="canvas.html">Canvas</a></li>
            <li><a href="pendaftaran.html">Pendaftaran</a></li>
        </nav>

        <article>
            <h1> Foto Kucing Lusyuu >< </h1>
            
            <img src="./image/image1.jpg " 
            onmouseover="this.style.filter='blur(3px)'"
            onmouseout="this.style.filter='blur(0px)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">

            <img src="./image/image2.jpg"
            onmouseover="this.style.transform='rotate(15deg)'"
            onmouseout="this.style.transform='rotate(0deg)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">

            <img src="./image/image3.jpg"
            onmouseover="this.style.transform='translateY(-30px)'"
            onmouseout="this.style.transform='translateY(0)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">

            <img src="./image/image4.jpg"
            onmouseover="this.style.boxShadow='0 0 50px navy'"
            onmouseout="this.style.boxShadow='none'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">
            
            <img src="./image/image5.jpg"
            onmouseover="this.style.transform='scale(1.5) rotate(9deg)'"
            onmouseout="this.style.transform='scale(1) rotate(0deg)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">

            <img src="./image/image6.jpg"
            onmouseover="this.style.filter='brightness(150%)'"
            onmouseout="this.style.filter='brightness(100%)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">
            
            <img src="./image/image7.jpg"
            onmouseover="this.style.transform='scale(1.5)'"
            onmouseout="this.style.transform='scale(1)'"
            style="width:180px; margin:10px; transition:0.7s; border-radius: 20px;">

            <img src="./image/image8.jpg"
            onmouseover="this.style.border='9px solid grey'"
            onmouseout="this.style.border='none'"
            style="width:180px; margin: 14px; transition:0.7s; border-radius: 20px;">

            

        </article>

    </section>

    <footer>
        <p><i>copyright@Mayra Ruhandini_253307003_2026</i></p>
    </footer>

</body>

</html>
